server {
    listen 80;
    listen [::]:80;
    server_name yuxi.uyhnm.cn;

    # 强制 HTTP 跳转 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yuxi.uyhnm.cn;

    # =============== HTTPS 证书配置 ===============
    # 请将此处替换为您实际申请的 SSL 证书路径
    ssl_certificate /etc/nginx/cert/yuxi.uyhnm.cn.pem;
    ssl_certificate_key /etc/nginx/cert/yuxi.uyhnm.cn.key;
    
    # SSL 优化与安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # =============== 静态资源与 Gzip 加速 ===============
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ========= 前端静态页面托管 =========
    root /var/www/yuxi.uyhnm.cn/dist;
    index index.html;

    # 1. 拦截前端静态路由并返回 index.html (适配 React Router)
    location / {
        try_files $uri $uri/ /index.html;
        
        # 针对打包后的静态资源开启长效缓存
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public";
        }
    }

    # ========= 反向代理 PocketBase (极其关键) =========
    # 解决浏览器 HTTPS 页面无法请求 HTTP 接口的跨域和混合内容（Mixed Content）限制
    
    # 代理 PocketBase 的 API 接口和文件下载
    location /api/ {
        proxy_pass http://127.0.0.1:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 允许 PocketBase 的 SSE (Server-Sent Events) 长连接订阅
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
    }

    # 代理 PocketBase 的全功能后台管理面板
    location /_/ {
        proxy_pass http://127.0.0.1:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
