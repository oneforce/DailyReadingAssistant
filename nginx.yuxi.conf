server {
    listen 80;
    server_name yuxi.uyhnm.cn;

    # 强制 HTTP 跳转 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2  on;
    server_name yuxi.uyhnm.cn;

    # =============== 安全增强 ===============
    add_header Content-Security-Policy "upgrade-insecure-requests";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # =============== 日志配置 ===============
    error_log /var/log/nginx/yuxi.uyhnm.cn.error.log warn;
    access_log /var/log/nginx/yuxi.uyhnm.cn.access.log combined;

    # =============== HTTPS 证书 (TrustAsia) ===============
    ssl_certificate     /etc/nginx/certs/yuxi.uyhnm.cn_nginx/yuxi.uyhnm.cn_bundle.pem;
    ssl_certificate_key /etc/nginx/certs/yuxi.uyhnm.cn_nginx/yuxi.uyhnm.cn.key;
    
    # 推荐的加密算法与安全配置
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # =============== 静态资源与 Gzip 加速 ===============
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript;

    # ========= 前端静态页面托管 =========
    root /var/www/dailyreading;
    index index.html;

    # 1. 拦截前端静态路由并返回 index.html (适配 React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. 针对打包后的静态资源开启长效缓存
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    # ========= 反向代理 PocketBase =========
    # 代理 PocketBase 的 API 接口和文件下载
    location /api/ {
        proxy_pass http://127.0.0.1:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 允许 PocketBase 的 SSE (Server-Sent Events) 长连接订阅
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
    }

    # 代理 PocketBase 的全功能后台管理面板
    location /_/ {
        proxy_pass http://127.0.0.1:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}